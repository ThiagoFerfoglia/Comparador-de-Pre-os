<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Compareaqui</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        #produtos {
            max-width: 600px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .nome {
            font-size: 18px;
            font-weight: bold;
        }

        .preco {
            color: green;
            font-size: 16px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <h1>Comparador de Preços</h1>

    <div id="produtos">
        <p>Carregando produtos...</p>
    </div>

    <script>
        fetch("http://127.0.0.1:8000/produtos")
        .then(res => res.json())
        .then(data => {

            let div = document.getElementById("produtos")
            div.innerHTML = ""

            data.forEach(prod => {

                div.innerHTML += `
                    <div class="card">
                        <div class="nome">${prod.nome}</div>
                        <div class="preco">R$ ${prod.preco}</div>
                    </div>
                `
            })
        })
        .catch(error => {
            document.getElementById("produtos").innerHTML =
                "<p>Erro ao conectar com o servidor.</p>"
            console.error(error)
        })
    </script>

</body>
</html>
