<!DOCTYPE html>
<html>
<body>
    <h1>Comparador de Preços</h1>
    <div id="produtos"></div>

<script>
fetch("http://127.0.0.1:8000/produtos")
.then(res => res.json())
.then(data => {
    let div = document.getElementById("produtos")
    data.forEach(prod => {
        div.innerHTML += `<p>${prod.nome} - R$ ${prod.preco}</p>`
    })
})
</script>

</body>
</html>
